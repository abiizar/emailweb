<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You! | The 7 Day Glow Up System</title>
  <!-- Google Fonts: DM Sans and Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #F4F3EF; /* Premium warm cream/ivory background */
      --color-text-main: #1C1C1C;
      --color-text-muted: #555555;
      --color-accent-lime: #B5F63D;
      --color-accent-hover: #A4EB29;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--color-bg);
      background-image: 
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.035'/%3E%3C/svg%3E"),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.4) 0%, transparent 100%);
      color: var(--color-text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3vh 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4vh;
      background: rgba(255, 255, 255, 0.35);
      padding: 50px 40px;
      border-radius: 24px;
      border: 1px solid rgba(28, 28, 28, 0.05);
      box-shadow: 
        0 20px 40px -15px rgba(0, 0, 0, 0.05),
        inset 0 1px 1px rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
    }

    .success-icon {
      font-size: 3rem;
      background-color: var(--color-accent-lime);
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      box-shadow: 0 8px 20px rgba(181, 246, 61, 0.3);
    }

    .headline-serif {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-style: italic;
      font-weight: 500;
      color: var(--color-text-main);
      line-height: 1.2;
    }

    .message-text {
      font-size: clamp(0.95rem, 1.8vw, 1.1rem);
      line-height: 1.6;
      color: var(--color-text-muted);
      max-width: 480px;
    }

    .cta-button {
      width: 100%;
      max-width: 320px;
      padding: 16px 24px;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      font-weight: 800;
      color: #111111;
      background-color: var(--color-accent-lime);
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      text-decoration: none;
      font-family: var(--font-sans);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      box-shadow: 0 4px 15px rgba(181, 246, 61, 0.25);
      transition: all 0.2s ease;
    }

    .cta-button:hover {
      background-color: var(--color-accent-hover);
      box-shadow: 0 6px 20px rgba(181, 246, 61, 0.4);
      transform: translateY(-1px);
    }

    .cta-button:active {
      transform: translateY(0);
    }

    .back-link {
      font-size: 0.9rem;
      color: var(--color-text-main);
      text-decoration: underline;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }

    .back-link:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Success Icon -->
    <div class="success-icon">✦</div>

    <!-- Thank You Heading -->
    <h1 class="headline-serif">Your planner is ready.</h1>

    <!-- Message -->
    <p class="message-text">
      Thank you for subscribing! Click the button below to download your premium digital planner instantly and begin your 7-day tracking journey.
    </p>

    <!-- Call to Action -->
    <a href="https://drive.google.com/file/d/1UsWTrnndqkJ2k-a4hRKFy4xHIAo_vXtb/view?usp=sharing" target="_blank" class="cta-button">
      DOWNLOAD PLANNER &gt;
    </a>

    <a href="javascript:window.close();" class="back-link">Close this window</a>
  </div>

</body>
</html>
